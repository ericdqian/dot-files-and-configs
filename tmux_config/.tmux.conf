# Enable mouse interactions.
set-option -g mouse on

# Copy tmux selections to the system clipboard.
set-option -g set-clipboard on

# Keep mouse selections highlighted after copying; press q to exit copy mode.
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# Copy the selected text with y, like Vim visual mode.
bind-key -T copy-mode y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Preserve OSC 8 hyperlinks for the outer terminal.
set-option -as terminal-features ',*:hyperlinks'

# Show the session name at the top of each pane.
set-option -g pane-border-status top
set-option -g pane-border-format '#[fg=colour39,bold] #{session_name} #[default]'

# Show each window's name and Git branch in the bottom status line.
set-option -g status-position bottom
set-option -g status-style 'bg=colour235,fg=colour245'
set-option -g status-left ''
set-option -g status-right ''
set-option -g window-status-separator ' '
set-option -g window-status-format '#[fg=colour245] #I:#W #[fg=colour39]#(git -C "#{pane_current_path}" branch --show-current 2>/dev/null) #[default]'
set-option -g window-status-current-format '#[fg=colour235,bg=colour39,bold] #I:#W #(git -C "#{pane_current_path}" branch --show-current 2>/dev/null) #[default]'

# Prefix + s creates a pane below; Prefix + w creates one beside it. New panes inherit the current pane's directory.
bind-key s split-window -v -c '#{pane_current_path}'
bind-key w split-window -h -c '#{pane_current_path}'

# Prefix + c creates a window after the current session's last window.
bind-key c new-window -a -t ':{end}'

# Prefix + h/j/k/l resizes the selected pane by five cells; keys repeat without re-pressing the prefix.
bind-key -r h resize-pane -L 5
bind-key -r j resize-pane -D 5
bind-key -r k resize-pane -U 5
bind-key -r l resize-pane -R 5

# Prefix + arrows select the adjacent pane.
bind-key Left select-pane -L
bind-key Down select-pane -D
bind-key Up select-pane -U
bind-key Right select-pane -R

# Prefix + o chooses a window from the current session only.
bind-key o run-shell 'tmux choose-tree -Nwf"##{==:##{session_name},#{session_name}}"'

# Prefix + r renames the current window.
bind-key r command-prompt -I '#W' "rename-window '%%'"

# Persist tmux sessions and restore the latest saved session when tmux starts.
set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'tmux-plugins/tmux-continuum'
set-option -g @continuum-restore 'on'

# Install TPM and the configured plugins automatically on a new machine.
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM; this must remain the final line in the config.
run '~/.tmux/plugins/tpm/tpm'
