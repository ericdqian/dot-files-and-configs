# Match the split directions used by Neovim and WezTerm.
set-option -g mouse on

# Prefix + s creates a pane below; Prefix + w creates one beside it.
bind-key s split-window -v
bind-key w split-window -h

# Prefix + h/j/k/l resizes the selected pane by five cells.
bind-key h resize-pane -L 5
bind-key j resize-pane -D 5
bind-key k resize-pane -U 5
bind-key l resize-pane -R 5

# Prefix + arrows select the adjacent pane.
bind-key Left select-pane -L
bind-key Down select-pane -D
bind-key Up select-pane -U
bind-key Right select-pane -R

# Prefix + o chooses a window from the current session only.
bind-key o run-shell 'tmux choose-tree -Nwf"##{==:##{session_name},#{session_name}}"'
